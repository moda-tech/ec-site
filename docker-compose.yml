services:
  app:
    build: ./docker/php
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    ports:
      - "5173:5173"   # ← Vite 用
    command: sh -c "php-fpm"

  web:
    image: nginx:1.25
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
